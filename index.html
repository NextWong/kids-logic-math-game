<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>小兔子闯关花园</title>
    <meta name="theme-color" content="#bde9ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="闯关花园">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23fffdf4'/%3E%3Ccircle cx='32' cy='22' r='10' fill='%23ffd45a'/%3E%3Cpath d='M32 32v18' stroke='%232f9b5c' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='24' cy='42' r='7' fill='%237bc86c'/%3E%3Ccircle cx='40' cy='42' r='7' fill='%237bc86c'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=20">
  </head>
  <body>
    <main class="game-app" aria-label="小小数学花园">
      <section class="top-bar" aria-label="游戏状态">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>小小数学花园</h1>
            <p id="roundLabel">第 1 题</p>
          </div>
        </div>
        <div class="stats" aria-live="polite">
          <span id="starMeter">0 颗星</span>
          <span id="modeLabel">混合练习</span>
        </div>
      </section>

      <section class="settings-strip" aria-label="年龄和语言">
        <div class="segmented-control" aria-label="年龄选择">
          <button class="age-button active" type="button" data-age="3">3岁</button>
          <button class="age-button" type="button" data-age="4">4岁</button>
          <button class="age-button" type="button" data-age="5">5岁</button>
          <button class="age-button" type="button" data-age="6">6岁</button>
          <button class="age-button" type="button" data-age="7">7岁</button>
        </div>
        <div class="segmented-control" aria-label="语言选择">
          <button class="language-button active" type="button" data-language="zh">中文</button>
          <button class="language-button" type="button" data-language="en">EN</button>
        </div>
      </section>
      <p id="difficultyLabel" class="difficulty-label">3岁：数到4，4以内加法，AB规律，只找一样。</p>

      <section class="stage" aria-label="游戏画面">
        <canvas id="gameCanvas" width="960" height="620" aria-label="数学花园游戏画面"></canvas>
      </section>

      <section class="prompt-row" aria-live="polite">
        <button id="speakBtn" class="small-action" type="button" title="朗读题目" aria-label="朗读题目">听</button>
        <div class="prompt-copy">
          <p id="promptText">选择开始。</p>
          <p id="feedbackText"></p>
        </div>
        <button id="nextBtn" class="small-action" type="button" title="换一题" aria-label="换一题">换</button>
      </section>

      <section id="choices" class="choices" aria-label="答案选项"></section>

      <section class="mode-strip" aria-label="练习模式">
        <button class="mode-button active" type="button" data-mode="mixed">混合</button>
        <button class="mode-button" type="button" data-mode="count">数数</button>
        <button class="mode-button" type="button" data-mode="add">加法</button>
        <button class="mode-button" type="button" data-mode="pattern">规律</button>
        <button class="mode-button" type="button" data-mode="logic">逻辑</button>
      </section>
    </main>

    <script src="game.js?v=20"></script>
  </body>
</html>
